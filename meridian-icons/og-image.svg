<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F5F1E8"/>

  <!-- 左侧图标 -->
  <g transform="translate(160, 175)">
    <circle cx="140" cy="140" r="140" fill="none" stroke="#2F4A3A" stroke-width="10"/>
    <line x1="140" y1="-20" x2="140" y2="300" stroke="#2F4A3A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="140" cy="86" r="23" fill="#B8704A"/>
  </g>

  <!-- 右侧文字 -->
  <text x="560" y="305" font-family="Georgia, serif" font-size="110" font-weight="400" fill="#2F4A3A" letter-spacing="-2">Meridian</text>
  <text x="560" y="365" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="400" fill="#5A6B60">A private atlas of places we've been.</text>

  <!-- 底部细线装饰 -->
  <line x1="560" y1="395" x2="620" y2="395" stroke="#B8704A" stroke-width="3" stroke-linecap="round"/>
</svg>
